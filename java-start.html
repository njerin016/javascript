<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        console.log("Hello, world!")

        let firstName = "Nancy";
        let lastName = "Wachira"

        console.log(firstName);
        console.log(lastName);

        let age = 11;
        console.log(age);

        age = 54;
        console.log(age);

        console.log(23 + 97)
        console.log(23 + 97 + 10 + 54 + 93 +39)
        console.log((4 + 6 + 9) / 77)

        let a = 10;
        console.log(a);
        a = 17;
        console.log(a);

        let b = 7 * a;
        console.log(b);

        const max = 57;
        const actual = max - 13;
        const percentage = actual / max;
        console.log(percentage);

        let num1 = 4;
        num1++;
        console.log(num1);
        let num2 = 6;
        num2--;
        console.log(num2);

        let x = 5;
        let y = 8;
        x += y;
        console.log(x);
        x -= y;
        console.log(x);
        x *= y;
        console.log(x);
        y /= x;
        console.log(y);
        y %= x;
        console.log(y);
        y **= x;
        console.log(y);
    
    </script>
